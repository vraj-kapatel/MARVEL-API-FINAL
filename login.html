<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | Marvel API App</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./auth.css" />
  </head>
  <body>
    <main class="auth-card">
      <a class="auth-back" href="./index.html">Back to app</a>
      <h1 class="auth-title">Marvel <span>API</span></h1>
      <p class="auth-subtitle">Log in to search Marvel characters.</p>

      <form class="auth-form" id="login-form">
        <div class="auth-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </div>
        <p class="auth-message" id="auth-message" aria-live="polite"></p>
        <button class="auth-button" type="submit">Log In</button>
      </form>

      <p class="auth-switch">
        Need an account? <a href="./register.html">Create one</a>
      </p>
    </main>

    <script type="module" src="./login.js"></script>
  </body>
</html>
